# HTTP — sirve ACME challenge y redirige todo lo demás a HTTPS
server {
    listen 80;
    server_name zentimes.es www.zentimes.es;

    # Webroot para que certbot pueda renovar el cert sin downtime
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — sirve el SPA y hace proxy a backend en /api
server {
    listen 443 ssl;
    http2 on;
    server_name zentimes.es www.zentimes.es;

    ssl_certificate     /etc/letsencrypt/live/zentimes.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zentimes.es/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy de /api al backend Spring Boot
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Cache largo para assets con hash en el nombre (Vite los genera así)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: rutas que no existen como archivo → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
