name: Build and publish frontend image

# Se ejecuta en cada push a main o master, y permite ejecución manual desde la UI
on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/musicreviews-frontend
  # URL del backend que se incrusta en el bundle JS al hacer npm run build.
  # Apunta a localhost:8080 porque la imagen publicada está pensada para uso
  # local con docker-compose (donde el backend se expone en ese puerto).
  VITE_API_URL: http://localhost:8080/api

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Permisos requeridos: leer el código + escribir paquetes en GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN se inyecta automáticamente, no requiere configuración manual de secrets
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tags generados automáticamente:
          #   - latest          (siempre apunta al último build de la rama por defecto)
          #   - <branch>-<sha>  (tag inmutable con el commit corto, para trazabilidad)
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-,format=short

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
          # Cache de capas en GitHub Actions para acelerar builds subsiguientes
          cache-from: type=gha
          cache-to: type=gha,mode=max
